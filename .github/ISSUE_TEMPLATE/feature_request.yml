name: Feature request
description: Suggest an idea or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The use case, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What command/flag/output would you want? Keep it agent-friendly (structured, bounded).
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
