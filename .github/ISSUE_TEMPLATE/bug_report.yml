name: Bug report
description: Something didn't work as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! Please include the version, OS, exact command, and output.
        Run `vabc doctor --online` and paste its output — it catches most environment issues.
  - type: input
    id: version
    attributes:
      label: vabc version
      description: Output of `vabc --version`
      placeholder: v0.1.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options: [macOS, Linux, Windows, Other]
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact command(s) you ran.
      placeholder: |
        vabc product search bourbon --json
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Output / logs
      description: Paste stderr/stdout. Redact anything sensitive (there shouldn't be any — vabc uses no credentials).
      render: shell
